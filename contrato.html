function renderContractPreview(){
  const v = formValues();
  const paragraphs = contractParagraphs(v);
  const html = paragraphs.map(p => {
    if (p.type === 'title') return `<div class="title"><b>${p.text}</b></div>`;
    if (p.type === 'heading') return `<h4>${p.text}</h4>`;
    return `<p>${p.text}</p>`;
  }).join('');
  document.getElementById('contractText').innerHTML = html;
}

/* ---------- Firma ---------- */
const canvas = document.getElementById('sigCanvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let hasSignature = false;

function resizeCanvas(){
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#0B1210';
}
window.addEventListener('resize', () => { const data = hasSignature ? canvas.toDataURL() : null; resizeCanvas(); if (data){ const img = new Image(); img.onload = () => ctx.drawImage(img, 0, 0, canvas.getBoundingClientRect().width, canvas.getBoundingClientRect().height); img.src = data; } });

function getPos(e){
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}
canvas.addEventListener('pointerdown', (e) => {
  drawing = true;
  hasSignature = true;
  const p = getPos(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
});
canvas.addEventListener('pointermove', (e) => {
  if (!drawing) return;
  const p = getPos(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});
window.addEventListener('pointerup', () => { drawing = false; });
document.getElementById('clearSigBtn').addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasSignature = false;
});

/* ---------- PDF ---------- */
function buildContractPdf(v){
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const marginLeft = 20, marginRight = 20;
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const maxWidth = pageWidth - marginLeft - marginRight;
  let y = 20;

  function addParagraph(text, opts){
    opts = opts || {};
    const bold = !!opts.bold;
    const size = opts.size || 9.5;
    const align = opts.align || 'left';
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    doc.setFontSize(size);
    const lines = doc.splitTextToSize(text, maxWidth);
    lines.forEach(line => {
      if (y > pageHeight - 22){ doc.addPage(); y = 20; }
      const x = align === 'center' ? pageWidth / 2 : marginLeft;
      doc.text(line, x, y, { align });
      y += size * 0.42;
    });
    y += opts.gapAfter != null ? opts.gapAfter : 3.5;
  }

  contractParagraphs(v).forEach(p => {
    if (p.type === 'title') addParagraph(p.text, { bold: true, size: 13, align: 'center', gapAfter: 8 });
    else if (p.type === 'heading') addParagraph(p.text, { bold: true, size: 10.5, gapAfter: 3 });
    else addParagraph(p.text, { size: 9.5 });
  });

  const now = new Date();
  const fecha = now.toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
  const hora = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
  if (y > pageHeight - 60){ doc.addPage(); y = 20; }
  addParagraph(`Firmado electrónicamente por EL CLIENTE el ${fecha} a las ${hora}.`, { size: 9.5, gapAfter: 6 });

  const sigData = canvas.toDataURL('image/png');
  const sigWidth = 60, sigHeight = 22;
  if (y + sigHeight > pageHeight - 20){ doc.addPage(); y = 20; }
  doc.addImage(sigData, 'PNG', marginLeft, y, sigWidth, sigHeight);
  y += sigHeight + 4;
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.text('Firma de EL CLIENTE', marginLeft, y);

  return doc;
}

/* ---------- Envío ---------- */
document.getElementById('contractForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');
  const v = formValues();

  if (!v.nombre || !v.nif || !v.domicilio || !v.email || !v.telefono || !v.iban){
    msg.textContent = 'Rellena todos los campos.';
    msg.className = 'form-msg err';
    return;
  }
  if (!hasSignature){
    msg.textContent = 'Falta dibujar la firma.';
    msg.className = 'form-msg err';
    return;
  }
  if (!document.getElementById('f_accept').checked){
    msg.textContent = 'Debes aceptar los términos para continuar.';
    msg.className = 'form-msg err';
    return;
  }

  btn.disabled = true;
  msg.textContent = 'Generando el contrato…';
  msg.className = 'form-msg';

  const doc = buildContractPdf(v);
  const blob = doc.output('blob');
  const path = `${ORG.id}/${Date.now()}-contrato.pdf`;

  const { error: uploadError } = await supabase.storage.from('contratos-padel').upload(path, blob, { contentType: 'application/pdf' });
  if (uploadError){
    msg.textContent = 'No se ha podido guardar el contrato: ' + uploadError.message;
    msg.className = 'form-msg err';
    btn.disabled = false;
    return;
  }

  const precio = PLAN_PRICES[ORG.plan];
  const { error: insertError } = await supabase.from('contratos_padel').insert({
    organizacion_id: ORG.id,
    nombre_firmante: v.nombre,
    nif_cif: v.nif,
    domicilio: v.domicilio,
    email: v.email,
    telefono: v.telefono,
    iban: v.iban,
    plan: ORG.plan,
    precio_mensual: precio,
    pdf_path: path,
  });
  if (insertError){
    msg.textContent = 'El PDF se ha generado pero no se ha podido registrar: ' + insertError.message;
    msg.className = 'form-msg err';
    btn.disabled = false;
  } else {
    msg.textContent = '¡Contrato firmado! Descargando tu copia…';
    msg.className = 'form-msg ok';
  }

  doc.save(`contrato-gestionmypadel-${ORG.nombre.replace(/\s+/g, '-').toLowerCase()}.pdf`);
});

  const { data, error } = await supabase.from('organizaciones').select('id, nombre, slug, plan').eq('slug', slug).eq('activo', true).maybeSingle();
  if (error || !data){
    showError('No encontramos ninguna organización activa con ese identificador.');
    return;
  }
  if (!data.plan){
    showError(`"${data.nombre}" todavía no tiene un plan asignado. Contacta con EBM Proyectos de Software (${EBM_DATA.email}) antes de firmar.`);
    return;
  }
  ORG = data;
  document.getElementById('orgNameLabel').textContent = ORG.nombre;
  document.getElementById('planLabel').textContent = `${PLAN_LABELS[ORG.plan]} — ${fmtPrice(PLAN_PRICES[ORG.plan])} €/mes + IVA`;
  document.getElementById('loadingScreen').hidden = true;
  document.getElementById('formScreen').hidden = false;
  resizeCanvas();
  renderContractPreview();
}
function showError(message){
  document.getElementById('loadingScreen').hidden = true;
  document.getElementById('errorMsg').textContent = message;
  document.getElementById('errorScreen').hidden = false;
}

init();
</script>
</body>
</html>
